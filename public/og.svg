<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="g1" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#00FFB2" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#0A0A0F" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E1E30" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#0A0A0F"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>

  <!-- Eye motif -->
  <g transform="translate(140 300)">
    <ellipse cx="0" cy="0" rx="90" ry="52" fill="none" stroke="#00FFB2" stroke-width="3"/>
    <circle cx="0" cy="0" r="28" fill="#00FFB2"/>
    <circle cx="0" cy="0" r="12" fill="#0A0A0F"/>
    <circle cx="8" cy="-8" r="4" fill="#FFFFFF"/>
  </g>

  <!-- Wordmark -->
  <text x="280" y="270" font-family="Space Mono, monospace" font-weight="700" font-size="100" fill="#FFFFFF" letter-spacing="-2">ARGUS</text>
  <text x="282" y="330" font-family="JetBrains Mono, monospace" font-size="22" fill="#00FFB2" letter-spacing="6">AUTONOMOUS WEB3 SECURITY</text>

  <text x="282" y="420" font-family="Inter, sans-serif" font-weight="600" font-size="36" fill="#FFFFFF">The hundred-eyed guard</text>
  <text x="282" y="468" font-family="Inter, sans-serif" font-weight="600" font-size="36" fill="#FFFFFF">that never sleeps.</text>

  <text x="282" y="540" font-family="JetBrains Mono, monospace" font-size="18" fill="#8888AA">protocol-guardian · solguard · mosaic · aivenstu</text>

  <!-- Bottom accent line -->
  <rect x="0" y="624" width="1200" height="6" fill="#00FFB2"/>
</svg>
