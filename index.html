<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="color-scheme" content="dark light" />

    <!-- No-flash theme bootstrap: apply saved / system theme before paint. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('argus-theme');
          var theme =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia &&
                window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', theme === 'light' ? '#F8FAFC' : '#0A0A0F');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <title>Argus — Autonomous AI Security for DeFi</title>
    <meta
      name="description"
      content="Argus builds autonomous AI agents that monitor, detect, and respond to DeFi exploits before damage occurs. Runtime security for Web3 protocols."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Argus — Autonomous AI Security for DeFi" />
    <meta
      property="og:description"
      content="The hundred-eyed guard that never sleeps. Autonomous runtime security for Web3 protocols."
    />
    <meta property="og:image" content="/og.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Argus — Autonomous AI Security for DeFi" />
    <meta
      name="twitter:description"
      content="The hundred-eyed guard that never sleeps. Autonomous runtime security for Web3 protocols."
    />
    <meta name="twitter:image" content="/og.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Inter weight 400 only carries display + body (xAI discipline).
         JetBrains Mono 400/500 covers eyebrows + code surfaces. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
